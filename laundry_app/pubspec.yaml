name: laundry_app
description: "LaundroTrack ERP — Flutter frontend for commercial laundry management."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.1.0

  # Network
  dio: ^5.9.2

  # Storage
  flutter_secure_storage: ^10.0.0
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Models / Codegen
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0

  # UI
  flutter_screenutil: ^5.9.3
  fl_chart: ^1.2.0

  # Environment
  envied: ^1.3.4

  # Platform
  image_picker: ^1.2.1
  internet_connection_checker_plus: ^2.9.1+2
  intl: ^0.20.2
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  drift_dev: ^2.32.1
  envied_generator: ^1.3.4
  mocktail: ^1.0.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

