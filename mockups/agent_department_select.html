<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaundroTrack — Department Select</title>
<style>
  :root {
    --primary: #1A237E;
    --primary-light: #3949AB;
    --accent: #00897B;
    --pickup-blue: #1565C0;
    --delivery-green: #2E7D32;
    --damage-red: #C62828;
    --damage-yellow: #F9A825;
    --damage-green: #43A047;
    --bg: #F5F5F5;
    --card: #FFFFFF;
    --text-primary: #212121;
    --text-secondary: #757575;
    --border: #E0E0E0;
    --font: -apple-system, 'Segoe UI', Roboto, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: #e0e0e0;
    color: var(--text-primary);
    min-height: 100vh;
    display: flex; justify-content: center; align-items: center;
    padding: 24px 16px;
  }

  .view-toggle {
    position: fixed; top: 12px; right: 12px; z-index: 9999;
    background: var(--primary); color: #fff;
    border: none; border-radius: 8px; padding: 8px 16px;
    font-size: 13px; font-family: var(--font); cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .view-toggle:hover { background: var(--primary-light); }

  .phone-frame {
    width: 100%; max-width: 420px;
    min-height: 720px;
    background: var(--bg);
    border-radius: 36px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15), 0 0 0 4px #222;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .notch {
    width: 140px; height: 28px;
    background: #222; border-radius: 0 0 16px 16px;
    margin: 0 auto; flex-shrink: 0;
  }

  /* App bar */
  .app-bar {
    background: var(--primary);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px;
    transition: background .2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .app-bar-text {
    color: #fff;
  }
  .app-bar-text h1 { font-size: 18px; font-weight: 700; }

  /* Segmented control */
  .segment-bar {
    display: flex; margin: 18px 18px 0; gap: 0;
    background: var(--card);
    border-radius: 12px;
    padding: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .segment-btn {
    flex: 1; height: 42px;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700;
    font-family: var(--font); cursor: pointer;
    letter-spacing: 0.5px;
    transition: all .25s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .segment-btn.active-pickup {
    background: var(--pickup-blue); color: #fff;
    box-shadow: 0 2px 8px rgba(21,101,192,0.3);
  }
  .segment-btn.active-delivery {
    background: var(--delivery-green); color: #fff;
    box-shadow: 0 2px 8px rgba(46,125,50,0.3);
  }
  .segment-btn.inactive {
    background: transparent; color: var(--text-secondary);
  }
  .segment-btn.inactive:hover {
    background: rgba(0,0,0,0.03);
  }

  /* Content */
  .content {
    flex: 1; overflow-y: auto;
    padding: 20px 18px 28px;
  }
  .section-label {
    font-size: 13px; font-weight: 700; color: var(--text-secondary);
    letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 14px;
  }

  /* Department cards */
  .dept-card {
    background: var(--card); border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 18px; margin-bottom: 14px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all .2s;
  }
  .dept-card:hover {
    border-color: var(--pickup-blue);
    box-shadow: 0 4px 16px rgba(21,101,192,0.12);
    transform: translateY(-1px);
  }
  .dept-card:active { transform: scale(0.99); }

  .dept-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .dept-name {
    font-size: 17px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .dept-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .dept-icon-hk { background: #E3F2FD; }
  .dept-icon-rest { background: #FFF3E0; }
  .dept-icon-spa { background: #F3E5F5; }
  .dept-arrow {
    color: var(--text-secondary); font-size: 20px;
  }

  .dept-badges {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;
  }
  .chip {
    display: inline-flex; align-items: center;
    padding: 4px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 600;
  }
  .chip-blue { background: #E3F2FD; color: var(--pickup-blue); }
  .chip-teal { background: #E0F2F1; color: var(--accent); }
  .chip-green { background: #E8F5E9; color: var(--delivery-green); }
  .chip-purple { background: #F3E5F5; color: #7B1FA2; }

  .dept-meta {
    display: flex; align-items: center; gap: 16px;
    font-size: 13px; color: var(--text-secondary);
  }
  .dept-meta-item {
    display: flex; align-items: center; gap: 4px;
  }
  .dept-meta-item strong { color: var(--text-primary); }
</style>
</head>
<body>

<button class="view-toggle" onclick="location.reload()">Refresh</button>

<div class="phone-frame">
  <div class="notch"></div>

  <!-- App Bar -->
  <div class="app-bar">
    <button class="back-btn">←</button>
    <div class="app-bar-text">
      <h1>Hotel Sunrise</h1>
    </div>
  </div>

  <!-- Segmented Control -->
  <div class="segment-bar">
    <button class="segment-btn active-pickup" id="pickupTab" onclick="switchTab('pickup')">
      📦 PICKUP
    </button>
    <button class="segment-btn inactive" id="deliveryTab" onclick="switchTab('delivery')">
      🚚 DELIVERY
    </button>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="section-label">Select Department</div>

    <!-- Housekeeping -->
    <div class="dept-card">
      <div class="dept-header">
        <div class="dept-name">
          <div class="dept-icon dept-icon-hk">🛏️</div>
          Housekeeping
        </div>
        <div class="dept-arrow">›</div>
      </div>
      <div class="dept-badges">
        <span class="chip chip-blue">WEIGHT</span>
        <span class="chip chip-teal">SOILED</span>
      </div>
      <div class="dept-meta">
        <div class="dept-meta-item">💰 <strong>₹3.00/kg</strong></div>
        <div class="dept-meta-item">📋 <strong>5 items</strong></div>
      </div>
    </div>

    <!-- Restaurant -->
    <div class="dept-card">
      <div class="dept-header">
        <div class="dept-name">
          <div class="dept-icon dept-icon-rest">🍽️</div>
          Restaurant
        </div>
        <div class="dept-arrow">›</div>
      </div>
      <div class="dept-badges">
        <span class="chip chip-green">PIECE</span>
      </div>
      <div class="dept-meta">
        <div class="dept-meta-item">📋 <strong>4 items</strong></div>
      </div>
    </div>

    <!-- Spa -->
    <div class="dept-card">
      <div class="dept-header">
        <div class="dept-name">
          <div class="dept-icon dept-icon-spa">💆</div>
          Spa
        </div>
        <div class="dept-arrow">›</div>
      </div>
      <div class="dept-badges">
        <span class="chip chip-blue">WEIGHT</span>
        <span class="chip chip-purple">CALCULATED</span>
      </div>
      <div class="dept-meta">
        <div class="dept-meta-item">💰 <strong>₹4.00/kg</strong></div>
        <div class="dept-meta-item">📋 <strong>3 items</strong></div>
      </div>
    </div>

  </div>
</div>

<script>
function switchTab(tab) {
  const pickup = document.getElementById('pickupTab');
  const delivery = document.getElementById('deliveryTab');
  if (tab === 'pickup') {
    pickup.className = 'segment-btn active-pickup';
    delivery.className = 'segment-btn inactive';
  } else {
    pickup.className = 'segment-btn inactive';
    delivery.className = 'segment-btn active-delivery';
  }
}
</script>
</body>
</html>
